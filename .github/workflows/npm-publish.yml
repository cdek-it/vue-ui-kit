name: Publish Package
on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Тег релиза, из которого собирать green (напр. v2.0.1)'
        required: true
        type: string
      dist_tag:
        description: 'npm dist-tag'
        required: true
        type: choice
        options:
          - green
          - green-beta
        default: green
permissions:
  id-token: write
  contents: read
jobs:
  publish-npm:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
      - run: corepack enable
      - name: Run install
        uses: borales/actions-yarn@v4
        with:
          cmd: install
      - name: Run build
        uses: borales/actions-yarn@v4
        with:
          cmd: build
      - name: Update npm
        run: npm install -g npm@latest
      - name: Publish to npm
        run: |
          if [ "${{ github.event.release.prerelease }}" = "true" ]; then
            npm publish --tag beta
          else
            npm publish --tag latest
          fi

  publish-npm-green:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
      - run: corepack enable
      - name: Run install
        uses: borales/actions-yarn@v4
        with:
          cmd: install
      - name: Set green version suffix
        run: npm version "$(node -p "require('./package.json').version")-green" --no-git-tag-version --allow-same-version
      - name: Run build
        uses: borales/actions-yarn@v4
        with:
          cmd: build
        env:
          VITE_STYLE_PREFIX: green
      - name: Update npm
        run: npm install -g npm@latest
      - name: Publish to npm
        run: npm publish --tag ${{ inputs.dist_tag }}
